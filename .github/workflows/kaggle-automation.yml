name: Update Ethereum 1-min Kaggle Dataset

on:
  schedule:
    - cron: "0 0 * * *"  # every day at 00:00 UTC
  workflow_dispatch:  # manual trigger

jobs:
  update-dataset:
    runs-on: ubuntu-latest

    steps:
      - name: Check if secret exists
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          if [ -z "${KAGGLE_USERNAME}" ]; then
            echo "Secret is EMPTY"
            exit 1
          else
            echo "Secret is FOUND (Length: ${#KAGGLE_USERNAME})"
          fi
          if [ -z "${KAGGLE_KEY}" ]; then
            echo "Secret is EMPTY"
            exit 1
          else
            echo "Secret is FOUND (Length: ${#KAGGLE_KEY})"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests kaggle
                 
      - name: Run update script
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: python scripts/update_eth_data.py
